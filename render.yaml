databases:
  - name: xclusiv-postgres
    databaseName: xclusiv
    user: xclusiv
    plan: free

services:
  - type: web
    name: xclusiv-web
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: ./start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: xclusiv-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
