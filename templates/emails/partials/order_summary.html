<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin:0 0 24px;">
  <tr>
    <td style="padding:8px 0;color:#777777;font-size:14px;">Orden</td>
    <td align="right" style="padding:8px 0;font-weight:700;font-size:14px;">#{{ order.id }}</td>
  </tr>
  <tr>
    <td style="padding:8px 0;color:#777777;font-size:14px;">Fecha</td>
    <td align="right" style="padding:8px 0;font-size:14px;">{{ order.created_at|date:"d/m/Y H:i" }}</td>
  </tr>
  <tr>
    <td style="padding:8px 0;color:#777777;font-size:14px;">Estado del pedido</td>
    <td align="right" style="padding:8px 0;font-size:14px;">{{ order.get_status_display }}</td>
  </tr>
  <tr>
    <td style="padding:8px 0;color:#777777;font-size:14px;">Estado del pago</td>
    <td align="right" style="padding:8px 0;font-size:14px;">{{ order.get_payment_status_display }}</td>
  </tr>
  <tr>
    <td style="padding:8px 0;color:#777777;font-size:14px;">Cliente</td>
    <td align="right" style="padding:8px 0;font-size:14px;">{{ order.email }}</td>
  </tr>
  {% if show_shipping %}
  <tr>
    <td style="padding:8px 0;color:#777777;font-size:14px;">Envío</td>
    <td align="right" style="padding:8px 0;font-size:14px;">{{ order.address }}, {{ order.city }}</td>
  </tr>
  {% endif %}
</table>
