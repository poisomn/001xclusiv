{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar Sesión – 001xclusiv{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
            <h2 class="fw-bold mb-4 text-center">Bienvenido de nuevo</h2>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-dark btn-lg rounded-pill">Iniciar Sesión</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted small">
                    ¿No tienes cuenta? <a href="{% url 'accounts:register' %}"
                        class="text-dark fw-bold text-decoration-none">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
