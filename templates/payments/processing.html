{% extends "base.html" %}

{% block content %}
<section class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 mt-5">
            <h1 class="display-6 fw-bold text-uppercase mb-3">Procesando pago...</h1>
            <p class="text-muted fs-5">Estamos confirmando tu pago, esto puede tardar unos segundos.</p>

            <div class="spinner-border text-dark mt-4 mb-4" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Cargando...</span>
            </div>

            <p class="text-muted small">Por favor no cierres ni actualices esta p&aacute;gina.</p>
        </div>
    </div>
</section>

<script>
setTimeout(() => {
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    if (token) {
        window.location.href = `/payment/return/?token=${token}`;
    }
}, 5000);
</script>
{% endblock %}
