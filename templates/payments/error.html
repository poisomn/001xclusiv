{% extends "base.html" %}

{% block content %}
<section class="container py-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6 mt-5">
            <div class="mb-4">
                <i class="bi bi-exclamation-circle text-danger" style="font-size: 4rem;"></i>
            </div>
            <h1 class="display-6 fw-bold mb-3 text-uppercase">Problema con el pago</h1>
            <p class="text-muted fs-5 mb-5">{{ message|default:"Hubo un problema confirmando tu pago, pero estamos revis&aacute;ndolo." }}</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'core:home' %}" class="btn btn-dark px-4 py-2 text-uppercase fw-bold">Volver al inicio</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
